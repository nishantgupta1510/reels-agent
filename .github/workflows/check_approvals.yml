name: Post Approved YouTube Short

on:
  schedule:
    - cron: "3,33 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: telegram-approval-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-check.txt

      - name: Check Telegram for an approval
        id: check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_approvals.py

      - name: Save Telegram update position
        run: |
          git config user.name "reels-agent-bot"
          git config user.email "actions@github.com"
          git add .github/telegram_offset.txt
          git diff --cached --quiet || git commit -m "chore: save Telegram update position"
          git push

      - name: Restore YouTube authorization
        if: steps.check.outputs.approved == 'true'
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          test -n "$YOUTUBE_TOKEN_JSON" || { echo "YOUTUBE_TOKEN_JSON secret is not configured."; exit 1; }
          printf '%s' "$YOUTUBE_TOKEN_JSON" > youtube_token.json

      - name: Post approved video to YouTube
        if: steps.check.outputs.approved == 'true'
        env:
          VIDEO_PATH: output/approved/final.mp4
          SCRIPT_PATH: output/approved/script.json
          YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || secrets.YOUTUBE_PRIVACY_STATUS || 'unlisted' }}
          POST_INSTAGRAM: ${{ vars.POST_INSTAGRAM || secrets.POST_INSTAGRAM || 'false' }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          RELEASE_VIDEO_URL: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.check.outputs.draft_id }}/final.mp4
          DRAFT_ID: ${{ steps.check.outputs.draft_id }}
        run: python post_social.py

      - name: Delete successfully posted draft
        if: success() && steps.check.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ steps.check.outputs.draft_id }}" --yes

      - name: Notify Telegram of posting result
        if: always() && steps.check.outputs.approved == 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_STATUS: ${{ job.status }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PUBLISH: "true"
        run: python notify_telegram.py
