name: Generate Daily YouTube Draft

on:
  schedule:
    # 03:23 UTC = 08:53 IST (Morning commute)
    - cron: "23 3 * * *"
    # 08:23 UTC = 13:53 IST (Afternoon break)
    - cron: "23 8 * * *"
    # 13:23 UTC = 18:53 IST (Evening prime time)
    - cron: "23 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-youtube-draft
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick

      - name: Patch ImageMagick policy for MoviePy TextClip
        run: sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip list | grep -iE 'httpx|Pillow|openai|moviepy'

      - name: Generate script
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL || secrets.LLM_MODEL }}
          NICHE: ${{ vars.NICHE || secrets.NICHE }}
          VIDEO_LENGTH_SECONDS: ${{ vars.VIDEO_LENGTH_SECONDS || secrets.VIDEO_LENGTH_SECONDS || '55' }}
        run: python generate_script.py

      - name: Generate voiceover
        env:
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER || secrets.TTS_PROVIDER }}
          TTS_VOICE: ${{ vars.TTS_VOICE || secrets.TTS_VOICE }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVEN_VOICE_ID: ${{ secrets.ELEVEN_VOICE_ID }}
        run: python generate_voice.py

      - name: Verify voiceover was generated
        run: test -s output/voice.mp3 || { echo "::error::voice.mp3 is empty — TTS failed"; exit 1; }

      - name: Fetch visuals
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python fetch_visuals.py

      - name: Assemble video
        run: python assemble_video.py

      - name: Generate thumbnail
        run: python generate_thumbnail.py

      - name: Create compressed preview
        run: ffmpeg -i output/final.mp4 -vf scale=540:960 -crf 28 output/preview.mp4

      - name: Create draft ID
        if: success()
        id: draft
        run: echo "id=draft-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Save draft for approval
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.draft.outputs.id }} \
            output/final.mp4 output/script.json output/thumbnail.jpg \
            --draft \
            --title "${{ steps.draft.outputs.id }}" \
            --notes "Private temporary storage for a pending Telegram review."

      - name: Send the draft to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_review.py ${{ steps.draft.outputs.id }}

      - name: Notify Telegram of generation failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_STATUS: failure
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_telegram.py
